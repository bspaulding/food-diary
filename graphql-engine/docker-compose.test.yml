version: '3.6'
services:
  postgres:
    image: postgres:14
    environment:
      POSTGRES_PASSWORD: postgrespassword
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

  graphql-engine:
    image: food-diary-hasura:ci
    build: .
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      HASURA_GRAPHQL_METADATA_DATABASE_URL: postgres://postgres:postgrespassword@postgres:5432/postgres
      PG_DATABASE_URL: postgres://postgres:postgrespassword@postgres:5432/postgres
      HASURA_GRAPHQL_ENABLE_CONSOLE: "false"
      HASURA_GRAPHQL_DEV_MODE: "true"
      HASURA_GRAPHQL_ADMIN_SECRET: testadminsecret
      HASURA_GRAPHQL_ENABLED_LOG_TYPES: "startup, http-log, query-log"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8080/healthz | grep -q ok || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 20
      start_period: 60s

  test-runner:
    image: node:20-alpine
    working_dir: /app/tests
    volumes:
      - .:/app
    depends_on:
      graphql-engine:
        condition: service_healthy
    environment:
      HASURA_ENDPOINT: http://graphql-engine:8080/v1/graphql
      HASURA_ADMIN_SECRET: testadminsecret
    command: sh -c "npm install && npm test"
