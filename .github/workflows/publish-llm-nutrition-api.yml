name: Publish (llm-nutrition-api)
on:
  push:
    branches:
      - main
    tags:
      - "llm-nutrition-api-v*"
    paths:
      - "llm-nutrition-api/**"
env:
  REGISTRY: ghcr.io
  IMAGE_NAME: bspaulding/food-diary/llm-nutrition-api
jobs:
  build-and-publish-image:
    runs-on: ubuntu-latest
    permissions:
      packages: write
      contents: read
      attestations: write
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@65b78e6e13532edd9afa3aa52ac7964289d1a9c1
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@9ec57ed1fcdbf14dcef7dfbe97b2010124a938b7
        with:
          images: |
            ghcr.io/bspaulding/food-diary/llm-nutrition-api
          tags: |
            type=match,pattern=llm-nutrition-api-(v.*),group=1
            type=ref,event=branch

      - name: Build and push Docker image
        id: push
        uses: docker/build-push-action@3b5e8027fcad23fda98b2e3ac259d8d67585f671
        with:
          context: llm-nutrition-api
          file: llm-nutrition-api/Containerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            HF_TOKEN=${{ secrets.HF_TOKEN }}
