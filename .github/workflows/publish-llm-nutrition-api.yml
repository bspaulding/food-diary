name: Publish (llm-nutrition-api)
on:
  push:
    branches:
      - main
    tags:
      - "llm-nutrition-api-v*"
jobs:
  publish:
    uses: ./.github/workflows/publish-image.yml
    with:
      component: llm-nutrition-api
      context: llm-nutrition-api
      file: llm-nutrition-api/Containerfile
    secrets: inherit
