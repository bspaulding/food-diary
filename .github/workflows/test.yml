name: Test

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:14
        env:
          POSTGRES_PASSWORD: postgrespassword
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
        ports:
          - 5432:5432

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Hasura image
        uses: docker/build-push-action@v5
        with:
          context: .
          load: true
          tags: food-diary-hasura:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Start Hasura
        # Find the postgres service container by its published port (more robust than
        # --filter ancestor which can fail if GHA normalises the image reference).
        # Create an explicit bridge network, graft postgres onto it with a stable alias,
        # then start Hasura on the same network. Container-to-container traffic on the
        # same bridge is always allowed; -p 8080:8080 publishes Hasura to localhost on
        # the runner for the health check and tests.
        run: |
          PG_ID=$(docker ps --format '{{.ID}}\t{{.Ports}}' \
            | awk -F'\t' '$2 ~ /5432/ {print $1; exit}')
          echo "postgres container: $PG_ID"

          docker network create ci-test-net
          docker network connect --alias postgres ci-test-net "$PG_ID"

          docker run -d \
            --name hasura \
            --network ci-test-net \
            -p 8080:8080 \
            -e HASURA_GRAPHQL_METADATA_DATABASE_URL="postgres://postgres:postgrespassword@postgres:5432/postgres" \
            -e PG_DATABASE_URL="postgres://postgres:postgrespassword@postgres:5432/postgres" \
            -e HASURA_GRAPHQL_ENABLE_CONSOLE=false \
            -e HASURA_GRAPHQL_DEV_MODE=true \
            -e HASURA_GRAPHQL_ADMIN_SECRET=testadminsecret \
            -e HASURA_GRAPHQL_ENABLED_LOG_TYPES="startup, http-log, query-log" \
            food-diary-hasura:ci

      - name: Wait for Hasura to be healthy
        run: |
          for i in $(seq 1 40); do
            if curl -fsS http://localhost:8080/healthz | grep -q ok; then
              echo "Hasura is healthy after $((i * 3))s"
              exit 0
            fi
            echo "[$i/40] not ready yet, retrying in 3s..."
            sleep 3
          done
          echo "Hasura did not become healthy within 120s"
          docker logs hasura
          exit 1

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install test dependencies
        working-directory: tests
        run: npm install

      - name: Run GraphQL tests
        working-directory: tests
        env:
          HASURA_ENDPOINT: http://localhost:8080/v1/graphql
          HASURA_ADMIN_SECRET: testadminsecret
        run: npm test

      - name: Show Hasura logs
        if: failure()
        run: docker logs hasura
