name: Migrate GHCR Packages
on:
  workflow_dispatch:
jobs:
  migrate:
    runs-on: ubuntu-latest
    permissions:
      packages: write
      contents: read
    steps:
      - name: Log in to GHCR
        uses: docker/login-action@65b78e6e13532edd9afa3aa52ac7964289d1a9c1
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Migrate nutrition-fact-labeller-rust to food-diary/nutrition-fact-labeller
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          TAGS=$(gh api /users/bspaulding/packages/container/nutrition-fact-labeller-rust/versions \
            --paginate | jq -r '.[].metadata.container.tags[]' | grep -v '^sha256-' | sort -u)
          echo "Tags found: $TAGS"
          for TAG in $TAGS; do
            echo "Migrating nutrition-fact-labeller-rust:$TAG to food-diary/nutrition-fact-labeller:$TAG"
            docker pull ghcr.io/bspaulding/nutrition-fact-labeller-rust:$TAG
            docker tag  ghcr.io/bspaulding/nutrition-fact-labeller-rust:$TAG \
                        ghcr.io/bspaulding/food-diary/nutrition-fact-labeller:$TAG
            docker push ghcr.io/bspaulding/food-diary/nutrition-fact-labeller:$TAG
          done
