name: Publish (web)
on:
  push:
    branches:
      - main
    tags:
      - "web-v*"
permissions:
  packages: write
  contents: read
  attestations: write
  id-token: write
jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - run: npm ci
      - run: npm test
        env:
          TZ: America/Los_Angeles

  publish:
    needs: test
    uses: ./.github/workflows/publish-image.yml
    with:
      component: web
      context: web
    secrets: inherit
