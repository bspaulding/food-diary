# Manifest of VLM candidates for the label-parser eval harness (vlm_benchmark /
# vlm_ocr_benchmark). This is the single source of truth for "which models are we
# tracking" — see scripts/fetch-model.sh and scripts/run-eval.sh, which both key off
# the [models.<key>] tables below, and eval-results/README.md for results once run.
#
# Deployment target for all of these: CPU-only, limited memory, potentially in-browser
# eventually — hence the focus on sub-2B models. See eval-results/README.md's Known
# Issues section for why general small chat VLMs (SmolVLM) struggled and dedicated
# small OCR/document models are the more promising next tier.
#
# To add a model: add a [models.<key>] entry below (find hf_repo + filenames from the
# model's HF repo file listing), then:
#   ./scripts/fetch-model.sh <key>
#   ./scripts/run-eval.sh <key> --smoke     # verify it loads/runs (cheap, 2 images)
#   ./scripts/run-eval.sh <key>              # full 33-image eval, both harnesses

[models.gemma-4-e4b]
display_name = "Gemma-4-E4B-it-Q4_K_M"
hf_repo = "bartowski/google_gemma-4-E4B-it-GGUF"
model_file = "gemma-4-E4B-it-Q4_K_M.gguf"
mmproj_file = "mmproj-F16.gguf"
projector_type = "gemma4v"
category = "already-evaluated"
status = "evaluated"
notes = """
~4B (elastic/MatFormer line, same family as gemma-4-e2b but the next size up). Not
previously evaluated in this project at all (unlike gemma-4-e2b, which had a prior
ad-hoc score) — added 2026-07-12 for a cross-size comparison motivated by possibly
distilling from a larger Gemma 4 model down to something deployable, and general
curiosity about how score scales with parameter count within the same model family.
Weights already present locally at vlm-models/gemma-4-e4b/ under renamed filenames (no
"google_" prefix, matching the same renaming pattern as gemma-4-e2b's local copy);
copied into models/gemma-4-e4b/ under those same local names to avoid a redundant
~5.9GB re-download — `hf_repo`/`model_file` above reflect the upstream repo for
provenance (confirmed via the HF API's file listing to have the exact same naming
pattern as gemma-4-e2b's upstream repo), but fetch-model.sh will report "already have"
and skip downloading given the copied files.
FULL EVAL (2026-07-13, 33 images): **excellent result** — 19/33 whole-record / 341/363
(93.9%) all-fields on full-JSON, 14/33 whole-record / 319/363 (87.9%) all-fields on
OCR-only. A clean improvement over gemma-4-e2b (14/33/89.0%, 12/33/73.0%) confirming
the expected size-scaling trend. This run already included the two-rule
`<1g`/added-sugars NUTRITION_PROMPT fix (it was evaluated after that commit landed,
correcting an earlier erroneous note here claiming otherwise). See eval-results/README.md
Known Issues #11 for the full E2B/E4B/12B comparison.
CONSOLIDATED PROMPT (2026-07-13, commit a6593e6): re-ran full-JSON with the
consolidated NUTRITION_PROMPT rule (replaces the two specific rules with one general
principle, also targeting a newly-found cholesterol_mg/sodium_mg confusion pattern) —
small improvement: 343/363 (94.5%, ▲+2), whole-record unchanged at 19/33. Currently
tied for 3rd-4th place with Qwen2-VL-2B (94.8%) behind LFM2.5-VL-1.6B (95.0%) — see
eval-results/README.md Known Issues #12 for the full 4-model comparison and the
decision to keep this prompt despite a regression on Qwen2-VL-2B.
"""

[models.gemma-4-12b]
display_name = "Gemma-4-12B-it-Q4_K_M"
hf_repo = "ggml-org/gemma-4-12B-it-GGUF"
model_file = "gemma-4-12B-it-Q4_K_M.gguf"
mmproj_file = "mmproj-gemma-4-12B-it-Q8_0.gguf"
projector_type = "gemma4v"
category = "already-evaluated"
status = "evaluated"
notes = """
~12B — NOT part of the elastic E2B/E4B line, a separate "full" dense Gemma 4 model
(same tier as the 31B referenced via OpenRouter in nutrition-fact-labeller/README.md).
Far above this project's stated CPU/on-device/sub-2B deployment target (see the
manifest header comment above) — added 2026-07-12 purely for cross-size comparison
within the Gemma 4 family (2B -> 4B -> 12B), motivated by interest in possibly
distilling from a model this size down to something deployable for this specific
task down the road. No local copy of the weights existed; fetched fresh from the HF
repo above (verified exact filenames via the HF API's file listing rather than
guessing, since this repo offers many quantizations and an incorrect filename would
silently curl-download a 404 error page instead of weights).
FULL EVAL (2026-07-13, 33 images, ~3 hours total — roughly 6x slower per image than
gemma-4-e2b, as expected for the parameter count): **anomalous, unresolved result.**
0/33 whole-record on both harnesses; 30/363 (8.3%) all-fields full-JSON, 10/363 (2.8%)
all-fields OCR-only — dramatically worse than gemma-4-e2b (89.0%/73.0%) and
gemma-4-e4b (93.9%/87.9%), breaking rather than continuing the E2B->E4B scaling trend.
Diagnosis: all 33 full-JSON cases returned syntactically valid JSON (0 parse errors)
but the large majority had every field set to null rather than garbled/wrong values
(a few cases did extract partially-correct real values, so it's not blind to the
image). Ruled out context overflow (n_ctx=4096 fixed across all models in this
harness; identical image-token counts as E2B/E4B for the same images, confirmed by
diffing logs).
MMPROJ QUANTIZATION RULED OUT (2026-07-13): re-ran the first 5 images with the bf16
mmproj (mmproj-gemma-4-12B-it-bf16.gguf, zero quantization loss) instead of Q8_0, as
a direct A/B — identical result, 1/55 (1.8%) all-fields, field-for-field the same as
Q8_0 on the same 5 images. Since full-precision bf16 reproduces Q8_0's failure
exactly, mmproj quantization is not the cause; did not proceed to a full 33-image
bf16 run given how decisive the 5-image signal was.
CONCLUSION: this looks like a genuine property of this specific 12B checkpoint/
conversion on this task, not a harness misconfiguration — untested alternates (chat-
template differences between converters, or the "full" 12B model's instruction-tuning
being less suited to literal structured-extraction than the elastic E2B/E4B line)
remain possible but weren't pursued further since the practical question was already
answered: gemma-4-e4b is the far more promising distillation-teacher candidate, not
12B — it's smaller, faster, and dramatically more capable at this task as measured.
See eval-results/README.md Known Issues #11 for full detail.
"""

[models.gemma-4-12b-bartowski]
display_name = "Gemma-4-12B-it-Q4_K_M-bartowski"
hf_repo = "bartowski/gemma-4-12B-it-GGUF"
model_file = "gemma-4-12B-it-Q4_K_M.gguf"
mmproj_file = "mmproj-gemma-4-12B-it-f16.gguf"
projector_type = "gemma4v"
category = "already-evaluated"
status = "evaluated-smoke-only"
notes = """
Same ~12B checkpoint as gemma-4-12b (google/gemma-4-12B-it), but converted by
bartowski instead of ggml-org — added 2026-07-13 to test whether gemma-4-12b's
anomalous 8.3%/2.8% all-fields result (see that entry's notes and
eval-results/README.md Known Issues #11) is specific to the ggml-org conversion
(e.g. a chat-template embedding difference) rather than the 12B checkpoint itself.
bartowski is the same converter used for gemma-4-e2b and gemma-4-e4b, both of which
scored well (89.0%/93.9% all-fields), so this is also a same-converter, different-size
comparison point. Unlike the ggml-org repo, this one offers an f16 mmproj
(mmproj-gemma-4-12B-it-f16.gguf) matching gemma-4-e2b/e4b's mmproj precision exactly
(the ggml-org repo only had Q8_0/bf16) — one fewer variable versus the original 12B
run. Same Q4_K_M quant level as gemma-4-12b for apples-to-apples comparison.
5-IMAGE DIAGNOSTIC (2026-07-13, same 5 images as the ggml-org mmproj A/B test — a
full 33-image run was deemed unnecessary given how consistent the signal already is):
**0/55 (0.0%) all-fields** — same failure signature as ggml-org's conversion (valid
JSON every time, 0 parse errors, but nearly every field null). Slightly worse than
ggml-org's 1/55 (1.8%) on the same 5 images, though at this sample size that gap
isn't meaningful — the takeaway is that it's just as bad, not that one converter is
measurably better. This is the third independent configuration to reproduce the same
failure (ggml-org+Q8_0 mmproj, ggml-org+bf16 mmproj, bartowski+f16 mmproj), ruling out
GGUF converter and mmproj precision as the explanation. See eval-results/README.md
Known Issues #11 — this strengthens the conclusion that the 12B checkpoint itself
behaves this way for this task, not a conversion/quantization artifact.
"""

